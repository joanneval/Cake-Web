<!DOCTYPE html>
<html lang="en">
<head>
    <title>My profile</title>
    <link rel="stylesheet" href="sign.css">
    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#7b1fa2,#ba68c8,#f3e5f5);
    padding:20px;
}

.profile-container{
    width:100%;
    max-width:700px;
    background:#fff;
    padding:35px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.15);
    animation:fadeIn 0.6s ease;
}

.profile-header{
    text-align:center;
    margin-bottom:25px;
}

.profile-header h1{
    color:#6a1b9a;
    font-size:32px;
}

.profile-header p{
    color:#777;
    margin-top:5px;
    font-size:15px;
}

.section-title{
    margin:25px 0 12px;
    color:#6a1b9a;
    font-size:18px;
    border-left:5px solid #ba68c8;
    padding-left:10px;
}

.input-group{
    margin-bottom:15px;
}

.input-group label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
    color:#4a148c;
}

.input-group input{
    width:100%;
    padding:12px 15px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
    transition:0.3s;
}

.input-group input:focus{
    border-color:#9c27b0;
    outline:none;
    box-shadow:0 0 8px rgba(156,39,176,0.2);
}

.row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

button{
    width:100%;
    padding:14px;
    margin-top:20px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#8e24aa,#ba68c8);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(142,36,170,0.25);
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:600px){
    .row{
        grid-template-columns:1fr;
    }

    .profile-container{
        padding:25px;
    }

    .profile-header h1{
        font-size:26px;
    }
}
</style>
</head>
<body>
    <div class="profile-container">
        <h1>Profile Management</h1>
        <input type="text" id="fullname" placeholder="Full name">
        <br>
        <input type="text" id="phone" placeholder="Phone Number">
        <br>

        <div class="address-group">
            <label for="street">Street Address:</label>
            <input type="text" id="street" placeholder="e.g., 123 Main St">
        </div>
        <div class="address-group">
            <label for="house_number">House Number:</label>
            <input type="text" id="house_number" placeholder="e.g., Apt 4B or Unit 10">
        </div>
        <div class="address-group">
            <label for="city">City:</label>
            <input type="text" id="city" placeholder="e.g., Springfield">
        </div>
        <div class="address-row">
            <div class="address-field address-group">
                <label for="state_province">State/Province:</label>
                <input type="text" id="state_province" placeholder="e.g., IL">
            </div>
            <div class="address-field address-group">
                <label for="postal_code">Postal Code:</label>
                <input type="text" id="postal_code" placeholder="e.g., 62704">
            </div>
        </div>

        <button onclick="updateProfile()">Update Profile</button>
    </div>

    <script>
        window.onload = function() {
            let user = JSON.parse(localStorage.getItem("user"));
            console.log("Loaded user:", user);

            if (user) {
                document.getElementById("fullname").value = user.name || "";
                document.getElementById("phone").value = user.phone || "";

                try {
                    const addressParts = JSON.parse(user.address || '{}'); 
                    document.getElementById("street").value = addressParts.street || user.street || "";
                    document.getElementById("house_number").value = addressParts.house_number || user.house_number || "";
                    document.getElementById("city").value = addressParts.city || user.city || "";
                    document.getElementById("state_province").value = addressParts.state_province || user.state_province || "";
                    document.getElementById("postal_code").value = addressParts.postal_code || user.postal_code || "";
                } catch (e) {
                    document.getElementById("street").value = user.street || "";
                    document.getElementById("house_number").value = user.house_number || "";
                    document.getElementById("city").value = user.city || "";
                    document.getElementById("state_province").value = user.state_province || "";
                    document.getElementById("postal_code").value = user.postal_code || "";
                }
            }
        };

        function updateProfile() {
            let user = JSON.parse(localStorage.getItem("user"));

            let name = document.getElementById("fullname").value.trim();
            let phone = document.getElementById("phone").value.trim();
            let street = document.getElementById("street").value.trim();
            let house_number = document.getElementById("house_number").value.trim();
            let city = document.getElementById("city").value.trim();
            let state_province = document.getElementById("state_province").value.trim();
            let postal_code = document.getElementById("postal_code").value.trim();

            if (!name || !phone || !street || !house_number || !city || !state_province || !postal_code) {
                alert("Please fill in all profile and address details.");
                return;
            }
            console.log("Form values:", {name, phone, street, house_number, city, state_province, postal_code});

            let phonePattern = /^\+?[0-9]{10,15}$/;
            if (!phonePattern.test(phone.replace(/\s/g, ''))) {
                alert("Please enter a valid phone number (10-15 digits).");
                return;
            }

            let formData = new FormData();
            formData.append("email", user.email);
            formData.append("name", name);
            formData.append("phone", phone);
            formData.append("street", street);
            formData.append("house_number", house_number);
            formData.append("city", city);
            formData.append("state_province", state_province);
            formData.append("postal_code", postal_code);

            fetch("update_profile.php", {
                method: "POST",
                body: formData
            })
            .then(res => res.text())
            .then(data => {
                console.log("Profile update response:", data.trim());
                if (data.trim() === "success") {
                    
                    user.name = name;
                    user.phone = phone;
                    user.street = street;
                    user.house_number = house_number;
                    user.city = city;
                    user.state_province = state_province;
                    user.postal_code = postal_code; 
                    localStorage.setItem("user", JSON.stringify(user));

                    alert("Profile updated successfully!");
                } else {
                    alert("Database Error: " + data);
                }
            })
            .catch(err => {
                console.error("Update profile error:", err);
                alert("Network error occurred.");
            });
        }
    </script>
</body>
</html>
