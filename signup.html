<!DOCTYPE html>
<html>
<head>
       <title>Sign Up</title>
       <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
            font-family:'Poppins',sans-serif;
            background:linear-gradient(135deg,#f8efff,#ecd8ff,#ffffff);
        }

        /* CARD */
        .login-container{
            width:100%;
            max-width:430px;
            background:rgba(255,255,255,0.95);
            backdrop-filter:blur(12px);
            border-radius:24px;
            padding:38px 30px;
            box-shadow:0 20px 45px rgba(106,27,154,0.12);
            animation:fadeUp .6s ease;
        }

        @keyframes fadeUp{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .brand{
            text-align:center;
            margin-bottom:18px;
        }

        .brand h1{
            font-family:'Dancing Script',cursive;
            color:#6a1b9a;
            font-size:2.3rem;
        }

        .brand p{
            color:#777;
            font-size:13px;
            margin-top:4px;
        }

        /* TITLE */
        h2{
            text-align:center;
            color:#6a1b9a;
            margin-bottom:24px;
            font-size:1.7rem;
        }

        /* FORM */
        form{
            display:flex;
            flex-direction:column;
            gap:14px;
        }

        .input-group{
            position:relative;
        }

        input{
            width:100%;
            padding:14px 16px;
            border:2px solid #ead7f7;
            border-radius:14px;
            font-size:15px;
            transition:0.3s;
            background:#fff;
        }

        input:focus{
            outline:none;
            border-color:#9b4dca;
            box-shadow:0 0 0 4px rgba(155,77,202,0.08);
        }

        /* BUTTON */
        button{
            margin-top:6+px;
            padding:10px;
            border:none;
            border-radius:50px;
            background:linear-gradient(45deg,#9b4dca,#6a1b9a);
            color:#fff;
            font-size:15px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
            box-shadow:0 12px 22px rgba(106,27,154,0.18);
        }

        button:hover{
            transform:translateY(-2px);
        }

        /* PASSWORD INFO */
        .helper{
            font-size:12px;
            color:#777;
            margin-top:-5px;
            padding-left:4px;
        }

        /* FOOTER */
        .footer-text{
            margin-top:22px;
            text-align:center;
            font-size:14px;
            color:#555;
        }

        .footer-text a{
            color:#6a1b9a;
            text-decoration:none;
            font-weight:600;
        }

        .footer-text a:hover{
            text-decoration:underline;
        }

        
        @media(max-width:500px){

        .login-container{
            padding:28px 22px;
        }

        .brand h1{
            font-size:2rem;
        }

        h2{
            font-size:1.5rem;
        }

        }
</style>
</head>
<body>


      <div class="login-container">
      <h2>Create Account</h2>

      <form id="signupForm">

             <input type="text" id="name" name="name" placeholder="Full Name" required>
             <input type="email" id="email" name="email" placeholder="Email Address" required>
             <input type="password" id="password" name="password" placeholder="Password" required>
             <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password" required>
             <button type="submit">SIGN UP</button>
         </form>

     <p>Already have an account?
     <a href="signin.html">Sign In</a>
     </p>


</div>
<script>
    document.getElementById("signupForm").addEventListener("submit", function(e) {
        e.preventDefault();
        let password = document.getElementById("password").value;
        let confirm = document.getElementById("confirmPassword").value;

if(password !== confirm){
    alert("Passwords do not match");
    return;
}
        let formData = new FormData(this);

        fetch("signup.php",{
            method:"POST",
            body: formData
        })
        .then(response =>response.text())
        .then(result=>{
            console.log(result);

            if (result.trim() ==="success"){
                alert("Account created!");
                window.location.href ="signin.html";
            }else{
                alert("signup error: " + result);
            }
            
        })
        .catch(error => {
            console.error(error);
            alert("Fetch failed");
        });
    });
</script>
</body>
</html>
