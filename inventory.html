<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management</title>
    <link rel="stylesheet" href="sign.css">
     <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f9f0ff 0%, #e1bee7 100%);
            min-height: 100vh;
            color: #333;
            overflow-x: hidden;
        }

        /* Navbar - Consistent with other pages */
        .navbar {
            background: rgba(155, 77, 202, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 3%;
            color: white;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(155, 77, 202, 0.3);
        }

        .logo {
            font-family: 'Dancing Script', cursive;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(45deg, #fff, #e1bee7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        /* Main Admin Container */
        .admin-container {
            padding: 90px 2% 2rem;
            width: 100%;
            max-width: 100%;
        }

        /* Admin Header */
        .admin-header {
            background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,255,255,0.9));
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 2rem;
            text-align: center;
            margin-bottom: 2rem;
            box-shadow: 0 15px 40px rgba(155, 77, 202, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .admin-title {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(2rem, 4vw, 3rem);
            background: linear-gradient(45deg, #6a1b9a, #9b4dca);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .admin-subtitle {
            color: #666;
            font-size: 1.1rem;
            margin: 0;
        }

        /* Content Wrapper */
        .content-wrapper {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
            height: calc(100vh - 200px);
            min-height: 600px;
        }

        /* Add Form Section */
        .add-form-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 15px 40px rgba(155, 77, 202, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            overflow-y: auto;
        }

        .form-title {
            color: #6a1b9a;
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.2rem;
            margin-bottom: 2rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #555;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select {
            padding: 0.8rem 1rem;
            border: 2px solid #e8f0fe;
            border-radius: 12px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #9b4dca;
            box-shadow: 0 0 0 3px rgba(155, 77, 202, 0.1);
            transform: translateY(-1px);
        }

        .form-actions {
            display: flex;
            gap: 1rem;
        }

        /* Table Section */
        .table-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 0;
            box-shadow: 0 15px 40px rgba(155, 77, 202, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .table-header {
            background: linear-gradient(135deg, #9b4dca, #6a1b9a);
            color: white;
            padding: 1.5rem;
            text-align: center;
        }

        .table-stats {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1rem;
        }

        .stat-item {
            text-align: center;
            padding: 0.5rem 1rem;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.8rem;
            opacity: 0.9;
        }

        .table-wrapper {
            flex: 1;
            overflow: auto;
            padding: 1rem;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            min-width: 800px;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th {
            background: linear-gradient(135deg, #9b4dca, #6a1b9a);
            color: white;
            padding: 1rem 0.8rem;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.75rem;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            padding: 1rem 0.8rem;
            border-bottom: 1px solid rgba(155, 77, 202, 0.1);
        }

        tr {
            transition: all 0.3s ease;
        }

        tr:hover {
            background: rgba(155, 77, 202, 0.05);
            transform: scale(1.01);
        }

        /* Stock Status */
        .low-stock {
            background: rgba(255, 193, 7, 0.15) !important;
            border-left: 4px solid #ffc107;
        }

        .out-stock {
            background: rgba(220, 53, 69, 0.15) !important;
            border-left: 4px solid #dc3545;
        }

        .status-badge {
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-in-stock {
            background: linear-gradient(45deg, #d4edda, #a8e6cf);
            color: #155724;
        }

        .status-low-stock {
            background: linear-gradient(45deg, #fff3cd, #ffeaa7);
            color: #856404;
        }

        .status-out-of-stock {
            background: linear-gradient(45deg, #f8d7da, #ff7675);
            color: #721c24;
        }

        /* Buttons */
        .btn {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .btn-primary {
            background: linear-gradient(45deg, #9b4dca, #6a1b9a);
            color: white;
            box-shadow: 0 4px 15px rgba(155, 77, 202, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(155, 77, 202, 0.4);
        }

        .btn-success {
            background: linear-gradient(45deg, #28a745, #20c997);
            color: white;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(40, 167, 69, 0.4);
        }

        .btn-danger {
            background: linear-gradient(45deg, #dc3545, #e74c3c);
            color: white;
            box-shadow: 0 4px 15px rgba(220, 53, 69, 0.3);
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(220, 53, 69, 0.4);
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .content-wrapper {
                grid-template-columns: 1fr;
                height: auto;
                gap: 1.5rem;
            }
        }

        @media (max-width: 768px) {
            .admin-container { padding: 85px 1.5% 1.5rem; }
            .navbar { padding: 0.7rem 2%; }
            .form-grid { grid-template-columns: 1fr; gap: 1rem; }
            .form-actions { flex-direction: column; }
            table { min-width: 750px; }
            th, td { padding: 0.8rem 0.5rem; font-size: 0.8rem; }
        }

        @media (max-width: 480px) {
            .admin-container { padding: 110px 1% 1rem; }
            .admin-header { padding: 1.5rem 1rem; }
            .add-form-section, .table-section { padding: 1.5rem 1rem; }
            table { min-width: 700px; }
            .btn { padding: 0.5rem 1rem; font-size: 0.8rem; }
        }

        /* Scroll effects */
        body.scrolled .navbar {
            padding: 0.6rem 3%;
            background: rgba(155, 77, 202, 0.98);
        }

        /* Loading animation */
        .loading {
            text-align: center;
            padding: 3rem;
            color: #9b4dca;
        }

        .loading i {
            font-size: 2.5rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <script>
        let user = JSON.parse(localStorage.getItem("user"));
        if (!user || user.role !== "admin"){
            alert("Admin access only!");
            window.location.href = "homepage.html";
        }
    </script>

    <div class="admin-container">
        <div class="admin-header">
            <h1>Inventory Management</h1>
            <p>Monitor and update inventory levels automatically</p>
        </div>

        <div class="content-wrapper">
            <div class="add-form-section">
                <h3>Add/Update Inventory</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Product Name</label>
                        <input type="text" id="prodName" placeholder="e.g., Mango Cake">
                    </div>
                    <div class="form-group">
                        <label>Size</label>
                        <select id="prodSize">
                            <option value="Small">Small</option>
                            <option value="Medium">Medium</option>
                            <option value="Large">Large</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Flavor</label>
                        <input type="text" id="prodFlavor" placeholder="e.g., Mango">
                    </div>
                    <div class="form-group">
                        <label>Quantity</label>
                        <input type="number" id="prodQty" placeholder="0" min="0">
                    </div>
                    <div class="form-group">
                        <label>Price (₱)</label>
                        <input type="number" id="prodPrice" step="0.01" placeholder="0.00">
                    </div>
                </div>
                <div class="form-actions">
                    <button class="btn btn-success" onclick="clearForm()">Clear</button>
                    <button class="btn" onclick="addInventory()">Add Product</button>
                </div>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Size</th>
                            <th>Flavor</th>
                            <th>Qty</th>
                            <th>Price</th>
                            <th>Status</th>
                            <th>Updated</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
    loadInventory();

    let editingId = null;

    function loadInventory() {
        fetch("inventory.php")
        .then(res => res.json())
        .then(data => {
            let table = document.getElementById("inventoryTable");
            table.innerHTML = "";
            data.forEach(item => {
                let row = table.insertRow();
                let statusClass = item.quantity <= 5 ? 'low-stock' : item.quantity === 0 ? 'out-stock' : '';
                let statusText = item.quantity > 5 ? 'In Stock' : item.quantity > 0 ? 'Low Stock' : 'Out of Stock';
                row.className = statusClass;
                
                row.innerHTML = `
                    <td>${item.product_name}</td>
                    <td>${item.size}</td>
                    <td>${item.flavor}</td>
                    <td><strong>${item.quantity}</strong></td>
                    <td>₱${parseFloat(item.price).toFixed(2)}</td>
                    <td><span class="status-badge status-${statusText.toLowerCase().replace(' ', '-')}">${statusText}</span></td>
                    <td>${new Date(item.last_updated).toLocaleString()}</td>
                    <td>
                        <button class="btn btn-primary" onclick="editInventory('${item._id}', '${item.product_name}', '${item.size}', '${item.flavor}', ${item.quantity}, ${item.price})">Edit</button>
                        <button class="btn btn-danger" onclick="deleteInventory('${item._id}')" title="Delete Item">Delete</button>
                        </td>
                `;
            });
            updateStats(data);
        })
        .catch(err => console.error("Load error:", err));  
    }

    function editInventory(id, name, size, flavor, qty, price) {
    
        document.getElementById("prodName").value = name;
        document.getElementById("prodSize").value = size;
        document.getElementById("prodFlavor").value = flavor;
        document.getElementById("prodQty").value = qty;
        document.getElementById("prodPrice").value = price;

        editingId = id;
        document.querySelector('.form-actions .btn:not(.btn-success)').textContent = 'Update Item';
        document.querySelector('.form-actions .btn:not(.btn-success)').style.background = 'linear-gradient(45deg, #28a745, #20c997)';
        
        document.querySelector('.add-form').scrollIntoView({ behavior: 'smooth' });
            
        }
       
    function addInventory() {
        let formData = new FormData();
        formData.append("product_name", document.getElementById("prodName").value);
        formData.append("size", document.getElementById("prodSize").value);
        formData.append("flavor", document.getElementById("prodFlavor").value);
        formData.append("quantity", document.getElementById("prodQty").value);
        formData.append("price", document.getElementById("prodPrice").value);

        if(editingId){
            formData.append("edit_id", editingId);
        }

        fetch("inventory.php", { method: "POST", body: formData })
        .then(res => res.text())
        .then(data => {
            if (data.trim() === "success") {
                let message = editingId ? "Item updated successfully!" : "Item added successfully!";
                alert(message);
                loadInventory();
                clearForm();
                editingId = null;
            } else {
                alert(" Error: " + data);
            }
        })
        .catch(err => console.error("Add error:", err));
    }

    function deleteInventory(id) {
        if (confirm(" Delete this inventory item?")) {
            let formData = new FormData();
            formData.append("delete_id", id);
            fetch("inventory.php", { method: "POST", body: formData })
            .then(res => res.text())
            .then(data => {
                if (data.trim() === "deleted") {
                    alert(" Item deleted successfully!");
                    loadInventory();
                } else {
                    alert(" Error: " + data.trim());
                }
            })
            .catch(err => {
                console.error("Delete error:", err);
                alert(" Delete failed: " + err.message);
            });
        }
    }

    function clearForm() {
        document.getElementById("prodName").value = "";
        document.getElementById("prodSize").value = "Small";
        document.getElementById("prodFlavor").value = "";
        document.getElementById("prodQty").value = "";
        document.getElementById("prodPrice").value = "";

        let saveBtn = document.querySelector('.form-actions .btn:not(.btn-success)');
        saveBtn.textContent = 'Add/Update Item';
        saveBtn.style.background = 'linear-gradient(45deg, #9b4dca, #6a1b9a)';
        editingId = null;
    }

    function updateStats(data) {
        let totalItems = data.length;
        let lowStock = data.filter(item => item.quantity > 0 && item.quantity <= 5).length;
        let outOfStock = data.filter(item => item.quantity === 0).length;

        console.log(`Stats: ${totalItems} total, ${lowStock} low stock, ${outOfStock} out of stock`);
    }
    </script>
</body>
</html>
