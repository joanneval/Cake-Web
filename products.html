<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management</title>
    <link rel="stylesheet" href="sign.css">
    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#f4ecff,#efe3ff,#ffffff);
    padding:30px;
}

/* Main Container */
.admin-container{
    max-width:1350px;
    margin:auto;
    background:#fff;
    border-radius:22px;
    padding:35px;
    box-shadow:0 15px 40px rgba(0,0,0,0.08);
    animation:fadeIn .6s ease;
}

/* Header */
.admin-header{
    text-align:center;
    margin-bottom:30px;
}

.admin-header h1{
    font-size:34px;
    color:#6a1b9a;
}

.admin-header p{
    color:#777;
    margin-top:8px;
    font-size:15px;
}

/* Form Card */
.add-form{
    background:#faf6ff;
    padding:28px;
    border-radius:18px;
    border:1px solid #eee;
    margin-bottom:30px;
}

.add-form h3{
    color:#6a1b9a;
    margin-bottom:20px;
    font-size:22px;
}

/* Form */
.form-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
}

.form-group{
    margin-bottom:18px;
}

.form-group label{
    display:block;
    font-weight:bold;
    color:#5e2b85;
    margin-bottom:8px;
}

.form-group input,
.form-group select,
.form-group textarea{
    width:100%;
    padding:13px 15px;
    border:1px solid #ddd;
    border-radius:12px;
    font-size:15px;
    transition:.3s;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus{
    border-color:#9c27b0;
    outline:none;
    box-shadow:0 0 0 4px rgba(156,39,176,0.10);
}

/* Buttons */
.btn-area{
    margin-top:10px;
}

.btn{
    border:none;
    padding:12px 20px;
    border-radius:12px;
    cursor:pointer;
    color:#fff;
    font-weight:bold;
    margin-right:8px;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-2px);
}

.btn-save{
    background:#6a1b9a;
}

.btn-save:hover{
    background:#4a148c;
}

.btn-clear{
    background:#9e9e9e;
}

.btn-clear:hover{
    background:#757575;
}

.btn-edit{
    background:#28a745;
}

.btn-danger{
    background:#e53935;
}

/* Table */
.table-box{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:900px;
}

th{
    background:#6a1b9a;
    color:#fff;
    padding:14px;
    text-align:left;
}

td{
    padding:14px;
    border-bottom:1px solid #eee;
}

tr:hover{
    background:#faf5ff;
}

/* Status Badge */
.badge{
    padding:6px 12px;
    border-radius:30px;
    font-size:13px;
    font-weight:bold;
}

.available{
    background:#e8f5e9;
    color:#2e7d32;
}

.inactive{
    background:#ffebee;
    color:#c62828;
}

/* Responsive */
@media(max-width:768px){
    .form-row{
        grid-template-columns:1fr;
    }

    .admin-header h1{
        font-size:28px;
    }

    .admin-container{
        padding:20px;
    }
}

/* Animation */
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>
<body>
    <script>
        let user = JSON.parse(localStorage.getItem("user"));
        if (!user || user.role !== "admin"){
            alert("Admin access only!");
            window.location.href = "homepage.html";
        }
    </script>

    <div class="admin-container">
        <div class="admin-header">
            <h1> Product Management</h1>
            <p>Add, edit, or remove cakes from the menu</p>
        </div>

        <div class="add-form">
            <h3>Add/Edit Product</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="prodName" placeholder="e.g., Chocolate Cake">
                </div>
                <div class="form-group">
                    <label>Price (₱)</label>
                    <input type="number" id="prodPrice" step="0.01" placeholder="0.00">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Size</label>
                    <select id="prodSize">
                        <option value="Small">Small</option>
                        <option value="Medium">Medium</option>
                        <option value="Large">Large</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Flavor</label>
                    <input type="text" id="prodFlavor" placeholder="e.g., Chocolate">
                </div>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="prodDesc" rows="3" placeholder="Product description..."></textarea>
            </div>
            <button class="btn btn-save" onclick="saveProduct()"> Save Product</button>
            <button class="btn btn-clear" onclick="clearForm()"> Clear Form</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Size</th>
                    <th>Flavor</th>
                    <th>Price</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="productsTable"></tbody>
        </table>
    </div>

    <script>
        loadProducts();

        function loadProducts() {
            fetch("products.php")
            .then(res => res.json())
            .then(data => {
                let table = document.getElementById("productsTable");
                table.innerHTML = "";
                data.forEach(product => {
                    let row = table.insertRow();
                    let status = product.available ? ' Available' : ' Inactive';
                    row.innerHTML = `
                        <td>${product.name}</td>
                        <td>${product.size}</td>
                        <td>${product.flavor}</td>
                        <td>₱${parseFloat(product.price).toLocaleString()}</td>
                        <td>${product.available ? 'Available' : 'Inactive'}</td>
                        <td>
                            <button class="btn btn-edit" onclick="editProduct('${product._id}')">Edit</button>
                            <button class="btn btn-danger" onclick="deleteProduct('${product._id}')">Delete</button>
                        </td>
                    `;
                });
            })
            .catch(err => console.error('Load failed:', err));
        }

        function saveProduct() {
            let formData = new FormData();
            formData.append("name", document.getElementById("prodName").value);
            formData.append("size", document.getElementById("prodSize").value);
            formData.append("flavor", document.getElementById("prodFlavor").value);
            formData.append("price", document.getElementById("prodPrice").value);
            formData.append("description", document.getElementById("prodDesc").value);

            fetch("products.php", { method: "POST", body: formData })
            .then(res => res.text())
            .then(data => {
                if (data.trim() === "success") {
                    alert("Product saved!");
                    loadProducts();
                    clearForm();
                } else {
                    alert("Error: " + data);
                }
            })
            .catch(err => console.error('Save failed:', err));
        }

        function editProduct(id) {
            fetch(`products.php?id=${id}`)
            .then(res => res.json())
            .then(product => {
                if(product){
                document.getElementById("prodName").value = product.name;
                document.getElementById("prodSize").value = product.size;
                document.getElementById("prodFlavor").value = product.flavor;
                document.getElementById("prodPrice").value = product.price;
                document.getElementById("prodDesc").value = product.description;
            }
        })
            .catch(err => console.error('Edit failed:', err));
        }

        function deleteProduct(id) {
            if (confirm("Delete this product?")) {
                let formData = new FormData();
                formData.append("delete_id", id);
                fetch("products.php", { method: "POST", body: formData })
                .then(res => res.text())
                .then(data => {
                    if (data.trim() === "deleted") {
                        alert("Product deleted!");
                        loadProducts();
                    }else{
                        alert("Error: " + data);
                    }
                })
                .catch(err => console.error('Delete failed:', err));
            }
        }

        function clearForm() {
            document.getElementById("prodName").value = "";
            document.getElementById("prodSize").value = "Small";
            document.getElementById("prodFlavor").value = "";
            document.getElementById("prodPrice").value = "";
            document.getElementById("prodDesc").value = "";
        }
    </script>
</body>
</html>
