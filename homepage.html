<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asuncion's Purple Hub | Home</title>
    <style>
        :root {
            --primary: #6a1b9a;
            --primary-dark: #4a148c;
            --secondary: #ab47bc;
            --accent: #e1bee7;
            --success: #4caf50;
            --light: #f8f9fa;
            --dark: #333;
            --border: #e0e6ed;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
            --shadow-hover: 0 20px 40px rgba(0,0,0,0.15);
            --gradient: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--dark);
            overflow-x: hidden;
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 7%;
            background: rgba(106, 27, 154, 0.95);
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .navbar.scrolled {
            padding: 0.8rem 7%;
            background: rgba(106, 27, 154, 0.98);
        }

        .logo {
            font-family: 'Dancing Script', cursive;
            font-size: 2.2rem;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo i {
            font-size: 2.5rem;
            background: white;
            color: var(--primary);
            padding: 8px;
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(106, 27, 154, 0.3);
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            font-size: 1.5rem;
            padding: 8px 16px;
            border-radius: 25px;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Dancing Script', 'Brush Script MT';
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: white;
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .nav-links a:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .nav-links a:hover::after {
            width: 80%;
        }

        /* HERO SECTION */
        .hero {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
            padding: 140px 7% 80px;
            gap: 5rem;
            background: linear-gradient(135deg, #f8f0ff 0%, #efe3ff 50%, #ffffff 100%);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .hero-content {
            animation: slideInLeft 1s ease-out;
        }

        .hero-content h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            line-height: 1.1;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.5rem;
            font-weight: 700;
        }

        .hero-content .highlight {
            position: relative;
        }

        .hero-content .highlight::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient);
            border-radius: 2px;
        }

        .hero-content p {
            font-size: 1.2rem;
            color: #666;
            line-height: 1.8;
            margin-bottom: 2.5rem;
            max-width: 28rem;
        }

        .hero-buttons {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            animation: slideInUp 1s ease-out 0.3s both;
        }

        .btn {
            padding: 16px 32px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--gradient);
            color: white;
            box-shadow: 0 12px 30px rgba(106, 27, 154, 0.3);
        }

        .btn-secondary {
            background: white;
            color: var(--primary);
            border: 2px solid var(--accent);
            box-shadow: 0 8px 25px rgba(106, 27, 154, 0.15);
        }

        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        .btn-primary:hover {
            box-shadow: 0 20px 50px rgba(106, 27, 154, 0.4);
        }

        /* HERO IMAGE */
        .hero-image {
            position: relative;
            animation: slideInRight 1s ease-out;
            text-align: center;
        }

        .hero-image img {
            width: 100%;
            max-width: 550px;
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(106, 27, 154, 0.2);
            transition: all 0.5s ease;
        }

        .hero-image:hover img {
            transform: scale(1.05) rotate(2deg);
        }

        /* FLOATING ELEMENTS */
        .floating-badge {
            position: absolute;
            background: white;
            padding: 16px 20px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            font-weight: 600;
            color: var(--primary);
            animation: float 6s ease-in-out infinite;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .floating-badge.one {
            top: 15%;
            left: -10%;
            animation-delay: 0s;
        }

        .floating-badge.two {
            bottom: 20%;
            right: -5%;
            animation-delay: 2s;
        }

        .floating-badge.three {
            top: 60%;
            right: 10%;
            animation-delay: 4s;
            background: var(--accent);
        }

        /* FEATURES SECTION */
        .features {
            padding: 100px 7%;
            background: linear-gradient(135deg, #ffffff 0%, #f8f7ff 100%);
        }

        .section-title {
            text-align: center;
            font-size: clamp(2rem, 4vw, 2.8rem);
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4rem;
            position: relative;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: var(--gradient);
            border-radius: 2px;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: white;
            padding: 2.5rem 2rem;
            border-radius: 24px;
            box-shadow: var(--shadow);
            transition: all 0.4s ease;
            border: 1px solid rgba(255, 255, 255, 0.5);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient);
        }

        .card:hover {
            transform: translateY(-12px) rotateX(5deg);
            box-shadow: var(--shadow-hover);
        }

        .card-icon {
            width: 70px;
            height: 70px;
            background: var(--gradient);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 1.8rem;
            color: white;
            box-shadow: 0 10px 30px rgba(106, 27, 154, 0.3);
        }

        .card h3 {
            color: var(--primary);
            font-size: 1.4rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .card p {
            color: #666;
            text-align: center;
            line-height: 1.7;
        }

        /* FOOTER */
        .footer {
            background: var(--gradient);
            color: white;
            text-align: center;
            padding: 3rem 7%;
            position: relative;
            overflow: hidden;
        }

        .footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
        }

        /* ANIMATIONS */
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }

        /* RESPONSIVE */
        @media (max-width: 1024px) {
            .hero {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 3rem;
            }
            
            .hero-image {
                order: -1;
            }
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 1rem 5%;
                flex-wrap: wrap;
                gap: 1rem;
            }
            
            .nav-links {
                gap: 1rem;
            }
            
            .hero {
                padding: 160px 5% 60px;
            }
            
            .features {
                padding: 60px 5%;
            }
        }

        @media (max-width: 480px) {
            .nav-links {
                flex-direction: column;
                gap: 0.8rem;
                padding: 1rem 0;
            }
            
            .hero-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 100%;
                max-width: 280px;
                justify-content: center;
            }
        }

        
        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--primary);
            font-size: 1.2rem;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
            40% { transform: translateX(-50%) translateY(-10px); }
            60% { transform: translateX(-50%) translateY(-5px); }
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo"></div>
            <ul class="nav-links">
                <li><a href="homepage.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="about.html">About us</a></li>
                <li><a href="profile.html">Profile</a></li>
                 
                <li id="adminInventory" style="display: none;"><a href="inventory.html"> Inventory</a></li>
                <li id="adminProducts" style="display: none;"><a href="products.html"> Products</a></li>
                <li id="adminSales" style="display: none;"><a href="sales.html"> Sales</a></li>
                <li id="ordersLink" style="display: none;"><a href="orders.html"> Orders</a></li>
                <li><a href="javascript:void(0)" onclick="logout()">Logout</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Welcome to Asuncion's Purple Hub</h1>
            <p>"Great service and delicious cakes! Highly recommend the chocolate cake."
  <br> "The pastries were fresh and tasty. A bit pricey, but worth it for the quality."</p>
        </div>
        <div class="hero-image">
            <img src="image/image.png" alt="Delicious Cakes" title="Asuncion's Purple Hub">
        </div>
    </section>

    <script>
        function logout(){
            localStorage.removeItem("user");
            alert("Logged out successfully!");
            window.location.href = "signin.html";
        }

       function checkAdmin(){
    try {
        let user = JSON.parse(localStorage.getItem("user"));
        console.log("User data:", user); 
        
        if(user && user.role === "admin"){
            console.log("Admin detected - showing menu links"); 
            let adminLinks = ['adminInventory', 'adminProducts', 'adminSales', 'ordersLink'];
            adminLinks.forEach(id =>{  
                let element = document.getElementById(id);
                if (element) {
                    element.style.display = "flex"; 
                    element.style.opacity = "1";
                }
            });
        } else {
            console.log("Not admin or no user:", user?.role); 
        }
    } catch(e) {
        console.error("Error checking admin:", e);
        localStorage.removeItem("user"); 
    }
}

checkAdmin();
window.addEventListener('load', checkAdmin);


document.addEventListener('visibilitychange', function() {
    if (!document.hidden) {
        checkAdmin();
    }
});
    </script>
</body>
</html>
